name: Deploy to CapRover

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get CapRover token
        id: auth
        run: |
          RESPONSE=$(curl -s -L -X POST http://95.182.100.126:3000/api/v2/login \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"${{ secrets.CAPROVER_PASSWORD }}\"}")
          
          TOKEN=$(echo $RESPONSE | jq -r '.data.token // empty')
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Error: Failed to get token"
            echo "Response: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Package backend
        run: |
          tar -czf /tmp/backend.tar.gz \
            captain-definition-backend \
            Dockerfile.backend \
            server.js \
            package.json \
            package-lock.json \
            api \
            lib
          
          # Rename for backend
          mkdir -p /tmp/be-extract
          tar -xzf /tmp/backend.tar.gz -C /tmp/be-extract
          mv /tmp/be-extract/captain-definition-backend /tmp/be-extract/captain-definition
          cd /tmp/be-extract && tar -czf /tmp/backend-final.tar.gz .

      - name: Deploy backend to CapRover
        run: |
          curl -X POST http://95.182.100.126:3000/api/v2/user/apps/appData/riri-be-dev \
            -H "x-captain-auth: ${{ steps.auth.outputs.token }}" \
            -F "sourceFile=@/tmp/backend-final.tar.gz"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}

      - name: Create CapRover archive
        run: |
          # Включаем dist, nginx.conf и Dockerfile вместе с captain-definition
          tar -czf frontend.tar.gz dist/ captain-definition nginx.conf Dockerfile
          
          echo "=== Archive root level ==="
          tar -tzf frontend.tar.gz | grep -v "^dist/" | head -10
          
          echo "=== Verifying captain-definition ==="
          tar -tzf frontend.tar.gz | grep "^captain-definition$" \
            && echo "✅ captain-definition found in archive" \
            || (echo "❌ captain-definition MISSING" && exit 1)

      - name: Get CapRover token
        id: auth
        run: |
          RESPONSE=$(curl -s -L -X POST http://95.182.100.126:3000/api/v2/login \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"${{ secrets.CAPROVER_PASSWORD }}\"}")
          
          TOKEN=$(echo $RESPONSE | jq -r '.data.token // empty')
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Error: Failed to get token"
            echo "Response: $RESPONSE"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy frontend to CapRover
        run: |
          curl -X POST http://95.182.100.126:3000/api/v2/user/apps/appData/riri-fe-dev \
            -H "x-captain-auth: ${{ steps.auth.outputs.token }}" \
            -F "sourceFile=@frontend.tar.gz"
