version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: riri-app-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"   # Vercel Dev Proxy
      - "5173:5173"   # Vite HMR
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
    networks:
      - app-network
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  app-network:
    driver: bridge
